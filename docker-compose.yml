version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: po_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: po_management
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: po_api
    working_dir: /app
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:password@db:5432/po_management
      SYNC_DATABASE_URL: postgresql://postgres:password@db:5432/po_management
      SECRET_KEY: super-secret-dev-key-change-in-production-32chars
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: "60"
      GOOGLE_CLIENT_ID: ""
      GOOGLE_CLIENT_SECRET: ""
      ANTHROPIC_API_KEY: ""          # <-- set your key here or in .env
      APP_ENV: development
      FRONTEND_ORIGIN: http://localhost:8000
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app
      - ./frontend:/app/frontend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  pg_data:
